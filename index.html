<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base Airdrop Simulator — Analyseur On-Chain</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0d;
  --card: #14161b;
  --card-sub: #1b1e24;
  --border: #222630;
  --base-blue: #0052ff;
  --base-blue-hover: #0046d5;
  --text: #ffffff;
  --muted: #8a93a6;
  --amber: #f5a623;
  --green: #00e87a;
  --red: #ff3b5c;
  --font: 'Inter', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  padding-bottom: 3rem;
}

/* Hero Top Banner with Digital Matrix Pattern */
.hero-banner {
  background: linear-gradient(180deg, rgba(0, 82, 255, 0.15) 0%, transparent 100%), #0a0b0d;
  position: relative;
  border-bottom: 1px solid var(--border);
  padding: 3rem 0;
  overflow: hidden;
}
.hero-banner::before {
  content: ''; position: absolute; inset: 0;
  background-image: linear-gradient(rgba(0, 82, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 82, 255, 0.05) 1px, transparent 1px);
  background-size: 20px 20px;
  pointer-events: none;
}

.wrap { max-width: 860px; margin: 0 auto; padding: 0 1.5rem; }

/* Header Elements */
.header-flex { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
.brand-box { display: flex; align-items: center; gap: 1rem; }
.base-logo {
  width: 48px; height: 48px; background: var(--base-blue); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(0, 82, 255, 0.3);
}
.base-logo-circle { width: 22px; height: 22px; border: 4px solid white; border-radius: 50%; }

.title { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }
.subtitle { font-size: 0.85rem; color: var(--muted); margin-top: 0.25rem; }
.author { font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; }
.author a { color: var(--base-blue); text-decoration: none; font-weight: 500; }

.badge-speculative {
  background: rgba(245, 166, 35, 0.1); border: 1px solid rgba(245, 166, 35, 0.3);
  color: var(--amber); font-size: 0.7rem; font-weight: 600; padding: 6px 12px; border-radius: 20px;
  display: flex; align-items: center; gap: 4px;
}

/* Main Container Box */
.main-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-top: -1.5rem; position: relative; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

.section-label { font-size: 0.65rem; color: var(--muted); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.5rem; }

/* Input field layout */
.search-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
.input-wrap { flex: 1; position: relative; }
.input-wrap input {
  width: 100%; background: var(--card-sub); border: 1px solid var(--border); border-radius: 10px;
  padding: 1rem 1.25rem; color: var(--text); font-family: var(--font); font-size: 0.9rem; outline: none;
  transition: border-color 0.2s;
}
.input-wrap input:focus { border-color: var(--base-blue); }

.btn-analyze {
  background: var(--base-blue); color: white; border: none; border-radius: 10px;
  padding: 0 1.75rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
}
.btn-analyze:hover { background: var(--base-blue-hover); }
.btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

/* Sub Address Utility Row */
.address-sub-bar {
  display: none; background: var(--card-sub); border: 1px solid var(--border); border-radius: 10px;
  padding: 0.75rem 1rem; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.8rem;
}
.sub-bar-addr { color: var(--muted); font-family: monospace; }
.sub-bar-right { display: flex; align-items: center; gap: 1rem; }
.eth-badge { background: #222630; padding: 4px 10px; border-radius: 6px; font-weight: 600; }
.link-basescan { color: var(--base-blue); text-decoration: none; font-weight: 500; }

/* Pseudo Tab Switcher Style */
.tab-bar { display: flex; background: var(--card-sub); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 1.5rem; }
.tab-item { flex: 1; text-align: center; padding: 0.6rem; font-size: 0.8rem; font-weight: 600; color: var(--muted); border-radius: 8px; cursor: pointer; }
.tab-item.active { background: var(--base-blue); color: white; }

/* Report Cards */
.report-layout { display: none; flex-direction: column; gap: 1.25rem; }
.metrics-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
.metric-card { background: var(--card-sub); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
.m-title { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
.m-value { font-size: 1.5rem; font-weight: 700; margin-top: 0.4rem; }
.m-value span { font-size: 0.85rem; color: var(--muted); font-weight: 400; }

/* Big Score Header inside Report */
.score-hero-box {
  background: linear-gradient(90deg, rgba(0, 82, 255, 0.1) 0%, transparent 100%);
  border: 1px solid var(--border); border-left: 4px solid var(--base-blue);
  border-radius: 12px; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center;
}
.score-hero-left .score-num { font-size: 3rem; font-weight: 800; color: white; line-height: 1; }
.score-hero-left .score-max { font-size: 0.9rem; color: var(--muted); margin-top: 0.25rem; }
.score-tier-label { font-size: 0.8rem; font-weight: 700; color: var(--base-blue); text-transform: uppercase; letter-spacing: 0.05em; }

/* Sybil Security Card */
.sybil-status-box { border-radius: 12px; padding: 1.25rem; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.sybil-info-title { font-size: 0.85rem; font-weight: 600; }
.sybil-info-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
.risk-badge { font-size: 0.7rem; font-weight: 700; padding: 6px 14px; border-radius: 6px; letter-spacing: 0.05em; }
.risk-FAIBLE { background: rgba(0, 232, 122, 0.1); color: var(--green); border: 1px solid rgba(0, 232, 122, 0.2); }
.risk-MODÉRÉ { background: rgba(245, 166, 35, 0.1); color: var(--amber); border: 1px solid rgba(245, 166, 35, 0.2); }
.risk-ÉLEVÉ { background: rgba(255, 59, 92, 0.1); color: var(--red); border: 1px solid rgba(255, 59, 92, 0.2); }

/* Common States */
.state-box { text-align: center; padding: 4rem 1rem; color: var(--muted); border: 1px dashed var(--border); border-radius: 12px; }
.state-icon { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.4; }
.loading-box { display: none; text-align: center; padding: 3rem 1rem; color: var(--muted); }
.progress-line { width: 150px; height: 2px; background: var(--border); margin: 1rem auto 0; border-radius: 2px; overflow: hidden; }
.progress-line-fill { height: 100%; background: var(--base-blue); animation: loadBar 1.5s infinite ease-in-out; }

.error-card { color: var(--red); font-size: 0.8rem; padding: 1rem; background: rgba(255,59,92,0.06); border: 1px solid rgba(255,59,92,0.2); border-radius: 10px; margin-bottom: 1.5rem; display: none; }

/* Footer */
.footer { margin-top: 3rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; font-size: 0.7rem; color: var(--muted); }
.footer a { color: var(--base-blue); text-decoration: none; }

@keyframes loadBar { 0% { width: 0; margin-left: 0; } 50% { width: 100%; margin-left: 0; } 100% {
